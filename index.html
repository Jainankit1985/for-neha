<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Neha ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffdde1,#ee9ca7);
background-size:400% 400%;
animation:gradient 15s ease infinite;
font-family:'Georgia',serif;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
z-index:2;
padding:30px;
}

h1{
font-size:3rem;
color:white;
text-shadow:0 0 20px rgba(255,255,255,0.8);
margin-bottom:20px;
}

.message{
font-size:2rem;
max-width:900px;
color:white;
line-height:1.6;
text-shadow:0 0 15px rgba(255,255,255,.7);
min-height:180px;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

.heart{
position:absolute;
color:white;
font-size:24px;
animation:float 8s linear infinite;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100px) rotate(360deg);
opacity:0;
}
}

.petal{
position:absolute;
top:-50px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-50px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}

button{
margin-top:40px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:50px;
background:white;
color:#e91e63;
cursor:pointer;
box-shadow:0 0 20px rgba(255,255,255,.6);
transition:.3s;
}

button:hover{
transform:scale(1.1);
}
</style>
</head>

<body>

<div class="container">
<h1>❤️ For Neha ❤️</h1>

<div class="message">
<span id="text"></span><span class="cursor">|</span>
</div>

<button onclick="showLove()">Click Here ❤️</button>
</div>

<script>

const msg =
"I arrived too late to be your first love, but maybe I arrived just in time to become the love of your life. ❤️";

let i=0;

function typeWriter(){
if(i < msg.length){
document.getElementById("text").innerHTML += msg.charAt(i);
i++;
setTimeout(typeWriter,70);
}
}

typeWriter();

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*40)+"px";
heart.style.animationDuration=(5+Math.random()*8)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},12000);
}

setInterval(createHeart,300);

function createPetal(){
const petal=document.createElement("div");
petal.classList.add("petal");
petal.innerHTML="🌹";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*8)+"s";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},12000);
}

setInterval(createPetal,700);

function showLove(){
alert("Neha ❤️\nYou are the most beautiful chapter of my life.");
}
</script>

</body>
</html>
